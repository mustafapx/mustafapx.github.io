<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sarah</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette for Envelope and Card */
            --bg-color: #f0f9ff; /* sky-50 */
            --text-color: #0c4a6e; /* sky-900 */
            --border-color: #bae6fd; /* sky-200 */
            --highlight-color: #0284c7; /* sky-600 */
            --accent-color: #38bdf8; /* sky-400 */
            --card-bg: #ffffff;
            
            /* Envelope Colors */
            --env-bg: #e0f2fe; /* sky-100 (a bit darker than background) */
            --env-flap: #bae6fd; /* sky-200 */
            --env-shadow: rgba(12, 74, 110, 0.15); /* sky-900 shadow */
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Special Elite', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px; /* Essential for 3D flip effect */
        }

        /* --- Envelope Styles --- */
        #envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--env-bg);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 20px var(--env-shadow);
            cursor: pointer;
            transition: transform 0.8s ease-in-out, opacity 0.5s ease;
            z-index: 10;
            display: block; /* Shown initially */
            transform-style: preserve-3d;
        }

        /* Hover effect to hint interactivity */
        #envelope-wrapper:hover {
            transform: translateY(-10px) rotateX(5deg);
        }

        /* The main triangular flap */
        #envelope-flap {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--env-flap);
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 11;
            filter: drop-shadow(0 4px 4px var(--env-shadow));
        }

        /* The "front" pockets that the flap tucks into */
        .envelope-front {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100px; /* half height */
            background-color: var(--env-bg);
            border-radius: 0 0 8px 8px;
            z-index: 12; /* Above flap before opening */
        }
        .envelope-front::before {
             content: '';
             position: absolute;
             top: 0; left: 0;
             width: 0; height: 0;
             border-left: 150px solid transparent;
             border-right: 150px solid transparent;
             border-bottom: 100px solid rgba(255,255,255,0.3); /* slight highlight */
        }

        /* Text inside the envelope */
        #envelope-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif;
            color: var(--highlight-color);
            text-align: center;
            font-size: 1.2rem;
            width: 80%;
            z-index: 13;
        }

        /* --- State: Envelope Opened --- */
        #envelope-wrapper.open {
            transform: translateY(20px) rotateX(-10deg); /* Slight dip before disappearing */
            opacity: 0;
            pointer-events: none; /* Can't click again */
        }

        #envelope-wrapper.open #envelope-flap {
            transform: rotateX(180deg); /* Flap flips up */
            z-index: 9; /* Flap goes "behind" the card */
        }


        /* --- Card Styles (Your original content) --- */
        #card-container {
            text-align: center;
            border: 6px double var(--border-color);
            padding: 60px 40px;
            background: var(--card-bg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            position: relative;
            animation: fadeIn 1s ease-out; /* Slower fade-in on reveal */
            border-radius: 4px;
            z-index: 2;
            display: none; /* HIDDEN INITIALLY */
        }

        /* Re-showing the card when the envelope opens */
        #card-container.reveal {
            display: block;
            animation: revealCard 1s ease-out forwards;
        }

        @keyframes revealCard {
            0% { opacity: 0; transform: translateY(100px) scale(0.8); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: var(--highlight-color);
            margin-bottom: 10px;
        }

        .clickable-name {
            cursor: pointer;
            display: inline-block;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
        }

        .name-pop {
            animation: popAnimation 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: #0ea5e9; text-shadow: 0 0 15px rgba(14, 165, 233, 0.4); }
            100% { transform: scale(1); }
        }

        .subtitle {
            font-size: 1.2rem;
            letter-spacing: 4px;
            border-bottom: 3px solid #e0f2fe;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .message { font-size: 1.5rem; line-height: 1.6; margin: 30px 0; color: #334155; }
        
        /* Flying icons (for click effect) */
        .flying-icon {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 100; /* High z-index */
            opacity: 0;
        }

        @keyframes flyAcross {
            0% { transform: translate(-10vw, 100vh) rotate(0deg); opacity: 1; }
            100% { transform: translate(110vw, -10vh) rotate(360deg); opacity: 0; }
        }

        /* Confetti (also for initial reveal) */
        .confetti {
            position: absolute;
            width: 8px; height: 8px;
            z-index: 100; /* High z-index to be on top */
            top: -10px;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    
    <div id="envelope-wrapper">
        <div id="envelope-flap"></div>
        <div class="envelope-front"></div>
        <div id="envelope-text">
            FOR<br>
            <span style="font-size: 1.5rem">⚔️SARAH⚔️</span><br>
            <small>(Click to Open)</small>
        </div>
    </div>

    <div id="card-container">
        <div class="subtitle">SHINZOU WO SASAGEYO!</div>
        <h1>HAPPY BIRTHDAY, <span id="sarah-name" class="clickable-name">⚔️SARAH⚔️</span></h1>
        <div class="message">
            <br>
            May your year ahead be free of walls <br>
        </div>
        <p>Dedicate your heart to having a great خفارات 🗿</p>
    </div>

    <script>
        const envelope = document.getElementById('envelope-wrapper');
        const card = document.getElementById('card-container');
        const nameEl = document.getElementById('sarah-name');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 1. Initial State: Page loads, confetti falls "behind" the envelope
        window.onload = () => createConfetti(30);

        // 2. Click handler for the ENVELOPE
        envelope.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // A. Trigger CSS open animation and hide envelope
            envelope.classList.add('open');

            // B. Wait for the envelope to "open and vanish", then reveal card
            setTimeout(() => {
                envelope.style.display = 'none'; // fully remove envelope
                card.classList.add('reveal');    // show the card
                
                // C. Extra confetti burst when the card appears
                setTimeout(() => createConfetti(60), 300); 

            }, 700); // This timing matches the CSS transition (0.6s flap + 0.1s buffer)
        });


        // --- Your Original JS Logic ---

        // Procedural Magical Chime Sound
        function playChimeSound() {
            const now = audioCtx.currentTime;
            [880, 1320, 1760].forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + (index * 0.05));
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.1, now + (index * 0.05) + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.05));
                osc.stop(now + 1.5);
            });
        }

        // Modified createConfetti (higher z-index, slightly randomized start)
        function createConfetti(amount = 40) {
            const colors = ['#0284c7', '#38bdf8', '#bae6fd', '#ffffff'];
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                //
