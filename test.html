<!DOCTYPE html>
<html>
<head>
<title>Ansam</title>
<style>
  body {
    /* Updated background color for a winter/Christmas feel */
    background-color: #003366; /* Deep blue */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: sans-serif;
    overflow: hidden; /* Hide scrollbars caused by snow */
    position: relative; /* For the snowflakes to position correctly */
  }
  .heart-container {
    position: relative;
    width: 100px;
    height: 90px;
    animation: pulse 1.5s infinite alternate;
    z-index: 5; /* Ensure heart is above snow */
    /* Add cursor pointer to indicate it's clickable */
    cursor: pointer;
  }
  .heart {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: #CC0000; /* Deeper Red */
    transform: rotate(-45deg);
  }
  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background-color: #CC0000;
  }
  .heart::before {
    top: -50px;
    left: 0;
  }
  .heart::after {
    left: 50px;
    top: 0;
  }
  .name {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 1.5em;
    font-weight: bold;
    z-index: 10;
    text-align: center;
    animation: bounce 1.5s infinite alternate;
  }
  /* --- CHRISTMAS HAT STYLES --- */
  .santa-hat {
    position: absolute;
    top: -60px; /* Position above the heart */
    left: 50%;
    transform: translateX(-50%);
    z-index: 15; /* Ensure hat is on top of everything */
    /* Add a small rotation to the hat */
    transform: translateX(-50%) rotate(-10deg);
  }

  .hat-red {
    width: 60px;
    height: 60px;
    background: red;
    border-radius: 0 50px 0 0;
    transform: skewY(-20deg);
    position: relative;
  }

  .hat-fur {
    position: absolute;
    top: 55px;
    left: -15px;
    width: 90px;
    height: 15px;
    background: white;
    border-radius: 50%;
  }

  .hat-pom {
    position: absolute;
    top: -15px;
    right: -10px;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
  }

  /* --- SNOWFLAKE STYLES --- */
  .snowflake {
    color: #fff;
    font-size: 1em;
    font-family: Arial, sans-serif;
    text-shadow: 0 0 1px #000;
    position: absolute;
    top: -10px;
    /* Animation properties for falling snow */
    animation: fall linear infinite;
  }

  @keyframes fall {
    to {
      transform: translateY(100vh);
    }
  }
  /* --- KEYFRAMES --- */
  @keyframes pulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.1); }
  }
  @keyframes bounce {
    0% { transform: translate(-50%, -50%) translateY(0); }
    100% { transform: translate(-50%, -50%) translateY(-5px); }
  }
</style>
</head>
<body>

<div id="clickableHeart" class="heart-container">
  <div class="santa-hat">
    <div class="hat-red"></div>
    <div class="hat-fur"></div>
    <div class="hat-pom"></div>
  </div>
  <div class="heart"></div>
  <div id="heartName" class="name">Gemini</div>
</div>

<script>
  // Assign the name first
  document.getElementById('heartName').textContent = 'Ansam ✨';
  
  // --- CLICK HANDLER ---
  // Wait until the element is present before trying to add the listener
  const heartContainer = document.getElementById('clickableHeart');

  if (heartContainer) {
    heartContainer.addEventListener('click', function() {
      alert('ميري كرسمس ماي سان 🐥.');
    });
  }

  // --- SNOWFLAKE JAVASCRIPT ---
  const body = document.body;
  const numSnowflakes = 50;

  for (let i = 0; i < numSnowflakes; i++) {
    const snowflake = document.createElement('div');
    snowflake.classList.add('snowflake');
    snowflake.textContent = '❅'; // Snowflake character

    // Randomize initial position, size, and duration
    const size = Math.random() * 0.5 + 0.5; // 0.5 to 1.0
    const duration = Math.random() * 10 + 5; // 5s to 15s

    snowflake.style.left = `${Math.random() * 100}vw`;
    snowflake.style.fontSize = `${size}em`;
    snowflake.style.animationDuration = `${duration}s`;
    snowflake.style.opacity = size; // Smaller snowflakes are less visible
    snowflake.style.animationDelay = `-${Math.random() * duration}s`; // Start at different points

    body.appendChild(snowflake);
  }
</script>

</body>
</html>
